body:
  text: 樵香小記卷下宗人府主事何琇撰十有三祀洪範稱十有三祀說者謂是時周未改制尚用商名竊疑古人記載往往通稱如唐虞曰載夏曰嵗堯典曰以閠月定四時成嵗又曰九載績用弗成又曰朕在位七十載舜典曰嵗二月東廵守又曰三載黜陟幽明又曰二十有八載蓋亦不拘一律也宋諱宋人避諱至嚴然核其遺文似有二例一曰闕筆一曰代字大抵尋常文句則僅闕筆若人姓名則必代字如殷浩作商浩桓𤣥作亘靈寳魏徴作魏證慎夫人作謹夫人匡衡作康衡蓋臨文不諱故僅作字不成若人之姓名則不可使同於祖考此其别也五經四書世謂五經四書試士始明此不考也元史選舉志載延祐科舉法已然其用宋儒傳註亦同一例又宋元祐制以周禮左氏春秋禮記為大經易詩書儀禮公羊榖梁春秋為中經進士各治一大經兼一中經仍治論語孟子第一塲大經義三道論語義一道第二塲中經義三道孟子義一道則北宋試士已以論語孟子為主特無大學中庸耳宋試春秋題宋貢舉條式論春秋義題聴於三傳解經處出蓋以春秋經文簡畧命題易複故也此法如行可稍杜治春秋者惟記破題之病虞夏書左傳引虞書多作夏書考說文琨字註曰虞書揚州貢瑶琨蠙字註曰夏書玭從虫賓亦一部之中二名兼出或謂伏生尚書大傳合虞夏為一傳疑古書搃題虞夏引者可以互稱然大傳有唐傳未聞有唐書則其說亦不盡然闕疑可矣時㑹解逸周書時㑹解所述乃是夏正此不可曉廣韻註廣韻註有絶可笑者如東字下註東宫氏齊大夫東宫得臣之後刁字下註齊豎刁之後世子而云大夫寺人而云有後即姓氏書有此謬談亦不應漫無考訂至此何博古圖誤說州吁即傳笑千古也經典釋文經典釋文為古義之淵藪學者得以考見先儒音訓惟賴是書厥功甚偉獨怪其不及孟子而以老子荘子俱列經典是居何義也茗飲三國志韋曜𫝊有茗飲之語論者援為飲茶之始然此語不止韋曜𫝊陸璣毛詩草木蟲魚疏曰椒樹似茱萸有鍼刺蜀人作茶吳人作茗皆合煮其葉以為香其文尤明璣亦吴人也萬嵗木謝眺詩風動萬年枝宋人以為冬青考陸璣詩䟽曰杻檍也今官園種之正名曰萬嵗既取名於億萬其葉又好故種之然則眺所詠者乃杻耳毛詩出子夏陸璣毛詩䟽末附四家詩源流所說傳毛詩人與經典釋文逈異故王魯齋疑之余謂漢書但云毛萇自謂出子夏已不能舉其授受之系後来何自得之非惟璣說無所本即陸徳明說亦未見所本也晉重左傳稱晉重耳為晉重終是脱字不可援為二名稱一之例二名稱一惟文選劉琨表段匹磾稱臣磾然亦焉知非脱字歟若詩文翦裁名姓以就聲律如干木葛亮方朔馬卿潘仁之類則自古有之要亦非自稱也紙字或疑古無紙小篆何以有紙字案說文紙訓絲滓也然則蔡倫以敗絮魚網為紙正絲滓耳故以名之硯字說文訓石滑亦不為磨墨之器昆蟲禮昆蟲無作鄭註訓昆為明於義為迂說文有䖵字音正作昆似同聲假借也書同文中庸書同文當以字體言之如籀則天下皆用籀篆則天下皆用篆隷則天下皆用𨽻耳至其㸃畫増減則聖人有所不能盡同今觀古器銘識即尊彞諸字形状不知凡幾其餘文字亦十不同五蓋王政持其大綱爾諧聲小篆諧聲疑多因古文之音而配之以字非制字始立音也如磺字諧黄聲古文乃作丱偏旁無黄字安有黄聲囿字諧有聲古文乃作偏旁無有字安有有聲秃字禿字說文載王育說謂倉頡見禿人伏禾下妄謬殊甚故許慎亦曰未知其審周伯琦謂上當從木諧聲亦似不然疑上當從禾㑹意說文禾木之曲頭止不能上也􅒧􅏞說文分􅒧􅏞為二部􅒧訓草木華也􅏞訓榮也華之與榮有何區别􅏞部收字訓草木白華然則􅏞亦草木華矣竊意荂􅏞皆􅒧之重文說文强分為二轉燭讀工部佳人詩不解其中轉燭字後偶坐佛閣檢大藏乃知富貴貧賤有如轉燭出佛說貧窮老公經此老固無所不讀皇極經世皇極經世殆以六日七分之法引而伸之但漢儒以卦值日邵子以卦值世耳此無論騐與不騐均非儒者所宜道如曰天運一定是堯舜不能不治桀紂不能不亂非所以立訓如曰人事尚可轉移是當治者不治當亂者不亂數又不確矣故孔子罕言命也鐙燭燭字見周禮禮記然諸家所說似然木以取明非今之蠟炬鐙字則經典無文禮記所云執鐙乃豆之跗也考古圖始有漢雁足鐙准字郭忠恕佩觿云三蒼作􅀈為尼丘之尼字林用准為平準之準則以准代準始於吕忱宋人謂避冦準名及蔡京父名者猶未溯其源也尹氏卒春秋書尹氏卒左傳以為君氏其說支離公榖以為周之尹氏近是或援劉卷之例謂果為王朝卿士自必書名然疑為史佚其名聖人有所不能益姑以尹氏書之如諸侯之卒例書名宿男不名之例也齊放崔氏于衛疑亦類此春秋古經馬貴與謂春秋古經雖漢藝文志有之然夫子所修之春秋其本文世所不見自漢以来所編古經則俱自三傳中取出經文名之曰正經耳此未考杜預之析傳附經而誤謂左氏傳中原載經文也春秋疑義隠公攝位而經文適不書正桓公弑立而經文適不書王文姜滛佚而經文適書子同生此諸儒論端所自起也以主是說者為是則於例不能盡合以主是說者為非則其說不為無因是亦不食馬肝之類也孔子曰多聞闕疑春秋廢傳廢例之漸春秋甚幽而明無𫝊而顯董仲舒之言也舍𫝊蘖於此矣春秋之經紀以善惡為實不以日月為例王充之言也廢例蘖於此矣据漢書儒林傳仲舒學公羊春秋者也據論衡序左傳始末充主左氏春秋者也後儒各矜心得實皆先儒所已言厶地杜預註左傳於不知其地者曰地闕范甯註榖梁傳於不知其地者曰厶地說者謂厶即某字之省文竊不謂然韓子稱於文自環為私背私為公厶字即古私字不得假借為某當由武子於原稿空一字作一三角圏記之如穆天子傳逸周書之作四角圏耳叠字石鼓文於叠字皆作二二即二字言此字有二文義亦明秦刻石於夫字下作二云是大夫鍾繇帖於祖字下作二云重且字其例雖古似未可行用印譜有文三橋所作努力加餐飯一印努字下左為二㸃云重力字右為二㸃旁作口字云重力字合為加字餐字下為二㸃旁作反字云重食字合為飯字論者病其太巧不知實祖秦刻石法祅祠杜預註左傳次睢之社云睢水上有祅祠此必不然宋襄公時祅祠何由至中國種子方李濓醫史謂淳于意及其師公乗陽慶皆無子知醫家無種子方其論甚正然不可謂古無此說漢書藝文志有三家内房有子法十七卷容成彭祖得容成御女術漢志房中有容成隂道二十七卷是其說也張衡同聲歌稱素女為我師天老教軒皇漢志房中有天老襍子隂道二十五卷是其說也漢志又有黄帝三王養陽方二十卷是萬安秘册古亦有之矣粲者女三為粲見於國語然實亦美女之通稱詩見此粲者𫝊以三女釋之未見其然古大夫乃有娣姪民庶流離之後幸遂室家匹夫匹婦禮之經也何三女之有放勲重華放勲見孟子重華見離騷其為堯舜之號不疑然必非在位之時以美詞自號殆舜禹所追稱乎此諡法之始萌也姚察傳姚思亷修陳書以其父察與江總合傳此真不可解事若李商隠贈杜牧詩稱前身應是梁江總以詞采言之則猶之可也譚公碩人詩稱齊侯之子衛侯之妻邢侯之姨皆舉其爵惟譚公維私稱公按春秋齊侯滅譚譚子奔莒則譚子爵也其變文之故思之不得鈞金束矢鈞金束矢之制儒者所疑此以後世律三代也後世以一官治一邑其事必訟乃理故訟恒繁古者州里族黨之間各有官以長之即婚姻財貨之事亦有官以司之其不合理者即治以法不至于訟凡其訟者必瑣屑無闗之務曖昧不決之疑吏所不必盡治者故限以輸官之物俾直者知訟之不易可稍忍而即於和曲者知所失不償所得亦權其輕重而知所避是化民息爭之道也儒者乃恐豪强者易辦貧懦者莫伸夫聖王之世法制修明豪强縱暴有舉其官者矣安用訟哉屠者以骨革納官周禮屠者以骨革納官此為屠肆言之使利薄而民不趍所以抑逐末之業而省無故之殺若自為賓祭用牲者雖漢唐末造斂不至是況周之盛乎原蠶禮禁原蠶傳有三說一曰蠶馬同氣恐其傷馬此理太迂一曰先王仁及昆蟲不欲使一嵗之中再罹湯火此為近之一曰原蠶絲惡恐妨民用此亦一理地動儀張衡地動儀余終不信有是事夫設機轉運則其機有定不能測無定設機待發則機不動不發氣不至不動氣動於數千里外而機應于此萬無此法蓋葭管之氣必至之氣也徧乎天下至其時則皆應地動之氣偶逆之氣也各于其地非其地則不知孔鼎李商隠詩湯盤孔鼎有述作今無其器存其詞如曰孔悝之鼎銘此何足道如曰正考甫之鼎銘則自孔父嘉以後始以王父字為氏正考甫非孔氏不得云孔鼎此或唐以前書别有孔子鼎銘今不可見矣唐人歌詩唐人歌詩宋人歌詞其法皆不𫝊白香山稱河滿子一曲四聲歌八叠今不知八叠謂何又古樂府多長萹而唐人惟歌絶句即律詩亦僅取半首古詩長萹如李嶠汾隂行髙適哭單父梁少府詩亦僅取四句或當時之曲以四聲八叠為定律歟然陽闗曲又云三叠搃不可考達摩支曲温飛卿集有達摩支曲莫曉其義考段安節樂府襍錄載舞曲有達摩支飛卿所作蓋當時舞曲也唐歌皆四句而此曲至十二句殆舞者須閱時稍久乃盡低昻旋轉之態不可驟進驟退故其詞長耶孔父春秋書宋華督弑其君與夷及其大夫孔父或以孔父為名或以孔父為字考古者孫以王父字為氏不聞以名則孔父為字更無疑義或謂春秋國史夫子不應避家諱不知筆削雖因魯史實私修之書藏之于家異乎君前臣名司馬子長作史記諱談為同范蔚宗作後漢書諱太為泰亦以私修也若史官載筆則有國諱無家諱矣誠節傳隋髙祖父名忠故當時諱忠為誠至修隋書時不諱矣而忠節傳曰誠節傳蓋諸人大抵隋舊臣習慣而不能改也㣲特此也虎林曰武林民部曰戸部之類且傳至今而不改矣文選文苑英華文選錄潘朂魏公九錫文阮籍勸進晉王牋是奨篡也文苑英華錄孔熙先為彭城王􅊾征鎮文祖君彦為李密􅊾隋文是奨叛也若文章正宗則必無此矣賀知章栁枝詞栁枝詞起于中唐故白香山詩稱聴取新翻楊栁枝也才調集乃有賀知章栁枝詞考何光逺鑑戒錄稱是篇為賀秘監知章咏栁是才調集悞娶妻不娶同姓禮娶妻不娶同姓鄭註謂為其近禽獸此語太甚家語言同姓百世不通婚姻周道然也則周以前或不拘矣康成以鳥獸行當之是内亂之說非娶同姓之說也傳註誤引經文書釐降二女于媯汭蔡傳引爾雅水北曰汭詩騋牝三千朱傳引記曰問國之富數馬以對禮術有序陳氏集說引周禮郷大夫春秋以禮㑹民而射于州序今本皆無此文魯頌春秋不同魯頌閟宫泮宫之作與淮夷獻琛之事皆在僖公時然春秋皆無其事或謂閟宫泮宫常事不書淮夷之事則史氏之鋪張不為實錄頌者歌詠之作不妨存臣子之詞春秋者立教之書不可没是非之實也是或然歟女媧補天列子女媧補天事張湛注以五色石為寓言五常是亦巧為之詞戰國諸子多與小說相出入不盡可詰即以列子而論龍伯釣鼇之事化人擥裾之談又譬何事乎毛詩漢志毛詩三十卷毛詩故訓傳二十九卷俱不著為毛亨毛萇據鄭康成詩譜魯人大毛公為故訓傳於其家河間獻王得而獻之以小毛公為博士則詩傳為毛亨作矣隋書經籍志則稱趙人毛萇善詩自云子夏所傳作訓故傳則以詩傳為毛萇作然宋以来並云毛萇不云毛亨疑不能明五言詩五言詩世稱始蘓李玉臺新詠則題古詩為枚乘作均漢武帝時人無庸較其先後惟張守節史記正義引楚漢春秋虞姬詩已全作五言此不可曉即曰陸賈贗託賈亦虞姬同時人也豈守節所見之本後来又有所竄入歟文言梁武帝以文言為文王作此於古無考直以穆姜引文言四語在孔子前而文字適合文王諡法以意斷之耳劉勰文心雕龍曰乾坤二卦獨制文言言之文也天地之心哉此又附㑹於文章之義亦非本㫖金章禮圭璧金璋不鬻於市皇侃註用金為印章則印章古有之矣今本作璋蓋字之誤既曰圭璧足以統璋不煩縷贅且璋不以金作則金自不連璋為文市不鬻金亦非可行之事列子有攫金于市事百國春秋墨子稱見百國春秋所引有周春秋杜伯一事燕春秋荘子儀一事宋春秋􅀈觀辜一事齊春秋王里國中里徼一事其文皆似傳體蓋古史官簡書䇿書之分䇿書詳其細目如墨子之所稱左氏據以作傳者是也簡書舉其大綱如汲冡竹書之體孔子所據以作經者也晉之乗𫝊稱羊舌肸習於春秋此晉之春秋非魯之春秋也孟子又曰晉之乘蓋春秋為記事之通名乘則一國之專名猶後世舉其總名則曰史舉其専名則曰漢書唐書古以史為官名後世以官名其書猶子亦人之美稱後世以人名其書周禮稱三皇五帝之書均不謂之史論語吾猶及史之闕文亦稱史官不稱史書總集自註註賦註詩合衆人之作為一集始於王逸錄總集者不及以楚詞自為一類也自錄已作亦始於逸而徐陵玉臺新詠芮挺章園秀集用其例自註已作亦始於逸而戴凱之竹譜謝靈運山居賦用其例漢書藝文志亦自註然寥寥無幾又非發明文義故不以托始注賦始薛綜注張衡両京賦注詩始顔延年沈約注阮籍詠懐詩詩中偶用自註始王融六朝人誤用古事六朝以綺麗相髙務求新艶往往不考本事梁武帝有代蘓屬國婦詩極述纒緜思逺之意然武固生妻去惟也吴均行路難稱倡家小女名桃根桃根乃桃葉之妹亦王獻之妾非倡家也李商隠詩桃葉桃根雙姊妹大學大學稱曽子作究不知其所據曽子二卷南宋尚存晁公武讀書志稱十篇皆見大戴禮髙似孫子畧亦云見大戴禮他又襍見小戴禮既曰襍見則中無全篇大學可知矣孔叢子漢人無引孔叢子者引孟子字子居一條以駁趙岐始於王肅其文與家語如一手殆亦肅所偽撰歟樵香小記卷下
