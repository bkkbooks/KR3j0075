body:
  text: 樵香小記卷上宗人府主事何琇撰奔者不禁周禮媒氏掌萬民之判令男三十而娶女二十而嫁仲春之月㑹男女于是時也奔者不禁若無故而不用令者罰之先儒率以奔者不禁為疑今推尋文義奔者當指男女不禁則指其父母若字當訓如左傳請為靈若厲之若言私奔而父母不禁與不遵嫁娶之制者均罰之耳先儒不以若字為連類之文而以為轉語則其疑宜矣春王正月春秋周正夏正紛如聚訟其他證佐姑無論但以左傳論之左氏周人也有誤記本朝之正朔者乎即如程子之説以左氏為秦人秦去周末為時無幾有相距數年即不知勝國之正朔者乎故春王正月辛亥朔日南至一條可以息千古之喙也西狩獲麟麟聖王之瑞也春秋亂極而終以獲麟思治也謂書成而麟至淺矣天王春秋或書天王或書王正猶史家或書皇帝或書帝無義例也先儒以王不書天為貶然則春王正月是亦王不書天矣又何貶乎元亨利貞元亨利貞文言傳明曰四徳註家則曰大通而利于至正然則孔子非歟又覺其異于孔子也則曰有伏羲之易有文王之易有孔子之易然則文王非演易孔子非賛易直改定伏羲之易矣祭叔來聘人臣無境外之交為敵國言之也若一王在上則畿内畿外皆王土畿内諸侯與畿外諸侯皆王臣正如京畿官與州郡官耳不應禁其信使以敵國視之說春秋者於畿内諸侯朝聘列國皆以外交為貶此義殆非末學所知有年春秋桓公宣公書有年皆紀其實事義不闗乎褒貶說者謂二君弑逆不應有年而有年故孔子特筆以示戒是聖人以降福亂賊咎上帝之失刑矣吕涇野說季孫意如卒謂書亂賊善終見天道之無知亦同此繆剛柔始交屯之為卦剛柔始交而難生夫天下之難未有不始于相交者也聖人知相交之生難而杜漸防㣲陳紀立綱詰姦禁暴所謂君子以經綸也老氏知相交之生難而曰民至老死不相往來則適成為老氏之學而已山下出泉水出髙原懸注而莫之遏也泉出于山下則翳穢沙泥皆足以障塞之猶童子聰明雖具而不能自達也濬之斯出導之斯流猶童子之資啟發矣故童蒙之象取義于斯姓譜姓譜至不可信其所述姓源非神明之胄亦卿大夫之有官有邑者也然則太古以來黎民不知幾萬萬億皆若敖之鬼乎或曰胙土賜姓别族命氏非有爵者無姓氏然則無爵者例無子孫乎卷耳詩序卷耳后妃之徳也夫採卷耳寘周行非后妃之行遣使臣閔勞苦亦非后妃之事此必大夫行役其室家念之之詞惟其哀而不傷勞而不怨有發乎情止乎禮義之意知沐浴于宫闈之化者深故曰后妃之徳云爾如曰后妃所自作則采采芣苢亦后妃自擷野草矣鄭風朱子排詆小序如木𤓰諸篇本事可考者亦從廢斥誠不無過當然余于鄭衛滛詩之説則灼然不疑夫古人之詩不似後来家有専集輶軒所採特里閭所歌而已其所歌者皆忠孝亷節之詞則知其俗之厚其所歌者皆奢麗綺靡之詞則知其俗之偷故誦詩可以觀政其間男女狎邪之詩亦如近代之襍曲小令多懸擬想像摹冩艶情不必實有其事諸儒既疑聖人不當存滛風是聖人亦不當存變雅也又疑滛者必不自暴其醜是玉臺香奩諸集皆佚女所自製也太極無極尊徳性道問學朱陸異趍此不得不辨者也太極無極理在天地去人事逺矣其是其非不闗于善惡得失兩家詰辨動盈萬言吾謂弊精神于無用河圖洛書先天後天凡註易者卷端必推演河圖洛書先天後天動數千萬言以為作易之本始夫天下之事理未有離其本始者其詮釋經文乃全不從是生義抑又何歟卦變乾坤生六子𫝊有明文其餘某卦從某卦来者乃後人以卦畫竒偶推其相生之理非先畫某卦然後變某卦也來瞿塘説易純以錯綜為主是執餘義為本義矣此如五藏屬五行遞生遞尅確有是理以病證騐之併確有是事然五藏實一時俱生非腎生肝肝生心心生脾脾生肺也周禮禮記不引周禮左氏春秋傳亦不引周禮然漢文帝得魏文侯樂工竇公出其本經即大司樂章此周禮不偽之明證矣蓋國家典制厯朝遞有沿革即一朝亦自有沿革周禮作于西京之初而禮記出于東遷以後數百年中其併省改易不知凡幾周禮為天子之制而左傳記諸侯之事其體例亦各不同未可執以定真偽也孟子誤字夫子之設科也趙岐註本夫子作夫予其註亦為孟子自道之詞文義顯然集註蓋偶沿誤本未核趙註觀孟子或問及語類均不辨及此字知朱子所見之本即作子字矣娣姪古者嫁女必以同姓為娣姪疑皆以宗女充之否則天王之女有備諸侯下陳者于事理不近蔡侯稱息媯吾姨荘姜稱譚公維私明姊妺不同歸也碩人又稱庶姜孽孽明非女公子也又魯嫁伯姬三國来媵齊人與焉實非同姓或周衰之變禮歟其或被出娣姪同歸與否禮無明文考左傳孔文子使太叔疾出其妻而妻之疾又誘其故妻之娣與之别居是歸則娣姪俱歸故誘而反之矣立後無子立後古禮也然此自為世官有廟者言非人人立後也後世人人立後非尊祖収族之本義孔子庶兄伯皮未聞有後豈非以不主祀歟不弔不入兆域禮云死而不弔者三曰畏壓溺又云兵死者不入於兆域此當指三軍大北潰卒敗將而言晉趙鞅誓師稱桐棺三寸不入兆域是其事也若執干戈以衛社稷埋輪紲馬首離而心不懲者是忠臣孝子宜報馨香曽先王制禮而苛為之罰乎牛馬古者牛服箱而不耕然冉耕字伯牛牛字從何起義古者馬駕車而不騎然駕車鉤衡而已不被鞌也春秋有地名鞌傳有據鞌而食事鞌字從何得名疑其事古皆有之但不似後世為通例耳河圖伏羲河圖先儒以為馬背旋毛然則顧命東序所陳當為馬革一具耶俞玉吾疑為玉類其說無據而石脈成文尚差近理洛書河圖曰圖作旋毛状可也洛書曰書定為文字漢儒以初一曰五行等六十五字為書文已為附㑹至解為九宫竒偶則是圖非書矣且神龜背負經典無文其說皆出於緯候宋人事事駁漢儒惟此事不能正也國風曰邶曰鄘曰唐曰檜皆西周之舊名而詩則多在東遷後知周時太史所掌詩有舊目後人弗敢増改但續采之風以類附入耳季札觀樂在孔子前曰為之歌邶鄘衛曰為之歌唐曰自檜以下無譏焉是其證也然則王風亦必舊目非孔子所定明矣劉氏論諸侯無私史劉原父謂東遷以前諸侯無私史此據春秋始平王四十九年臆斷之耳伯禽費誓首稱公曰此魯史之詞非周史之詞也翬帥師春秋書翬帥師㑹伐鄭慶父帥師伐於餘丘胡傳謂亂臣既得兵權遂肇弑逆聖人用示履霜之戒此全不考校之言古者兵出於農有事則聚而授甲役竣則散而歸田非有營衛之屯聚方鎮之𤓰分可籍之以為變故公子鮑之取宋陳氏之取齊皆厚施得民非得兵也況寪氏武闈之事皆一夫之力何嘗擁衆作亂乎春秋特筆春秋所載有顯然為聖人特筆者如鄭伯克段于鄢紀侯大去其國齊髙子来季子来歸鄭棄其師天王狩于河陽及晉處父盟公在乾侯陳亡書陳災趙盾許止書弑吴楚不書塟之類率變文見意其中必有美惡存焉所謂大義數十炳如日星者也其餘隨文褒貶大都顯然易見不待穿鑿至于無功無罪之人非善非惡之事又不可不著于䇿者則亦以常例書之而已説者字字生義是聖人治世非賞即誅不容有一中立之常人也杞宋正朔二王之後得用先朝之正朔此於𫝊無明文考宋取長葛春秋書冬而𫝊稱秋盖取以九月周正之冬商正之秋也此可證宋用商正禮記載孔子之杞得小正建寅舊典獨得于杞此可證杞用夏正野有死麕貞靜者守禮尚不足以見聖人之化至于懐春之女幾有越禮之志乃怯於厖吠卒畏人知則亷恥之防明有以遏其邪心也王柏乃以為滛奔之詩而黜之烏知刪定之㫖哉古占法左氏叙事固不免有誣然其所叙占法則必太卜之舊當代所同用譬如今之術數家言其神騐者多誣至其占課論單拆交重推命用五星八字則今世同用之法也舍左氏而言易例吾未之能信洛神賦註李善註文選字字必著其出典惟洛神賦註感甄事題為傳曰究不知為何傳也玉樓銀海東坡雪詩凍合玉樓寒起粟光揺銀海炫生花此正以銀玉比雪耳説者病其體物太似因託王安石語以玉樓為肩銀海為目云出道書然迄今無人能註出何道書也且雪光揺目于義猶通若肩則非埋身雪窖何至凍合哉說文解為字説文訓為字為母猴云此猴多技能故假借為作為字竊謂制字之初必先其切于人事者次則物之習見者必無先制一稀僻山獸之名反借為習用之字者或因母猴多技能假為字以名之則或然耳俗說初讀馬縞中華古今註稱俗說七月七日烏鵲為橋渡織女以為縞述流俗之說耳後讀隋書經籍志襍家有沈約俗說三卷乃知俗說為書名烏鵲橋事為約所記也漢儒易學世稱漢易襍䜟緯然丁寛田何以來都無是事至孟喜焦延夀京房始别岐一派漢書儒林傳稱孟喜别得占候書託之田王孫而梁丘賀證其誣劉向又稱獨京氏為異黨其文甚明此正如宋易于周程張外岐出邵子一派耳槩以京氏之學目漢易将槩以邵子之學目宋易乎古字假借先儒謂古人字少多用假借余不謂然大抵古人簡畧惟取音同如歐陽尚書漢碑作歐羊望陽家語作望羊古字雖少豈無隂陽字哉古無四聲先儒又謂古無四聲然如秦始皇帝諱政避諱讀正月為征此非以平去為辨乎劉熙釋名言天子有舌頭舌腹之分其區别亦細矣竊意古人雖朴必無東董棟江講絳讀若一音之理惟其詩賦押韻之例則三聲並用耳如宋詞多上去通押元曲以入聲攤配亦其押韻之例非宋元僅有三聲也鐸舞曲古鐸舞曲聖人制禮樂篇郭茂倩樂府詩集所載不可句讀考宋書樂志載此篇原每句空一字郭氏連而一之耳樂毅論右軍樂毅論或云書扇或云書石今輾轉鉤摹失其筆法則有之必不至竄改其字句然史記樂毅傳註載其全篇文句乃異同不一蘭亭序蘭亭序後之攬者句攬當為覽或云通用或云誤筆其實乃自避家諱故加才旁右軍王覽之後也曾子問曽子問臨娶遭喪一條所謂壻免喪後弗取而後嫁者先儒遞有論説然反覆思之不得其理女未嫁壻未娶忽遭父母之喪喪終成禮禮之當然何以免喪之後久定之盟又有請而弗取請而弗嫁者耶其弗取弗嫁又以何為詞耶古無叶音陳季立稱古無叶音凡今所謂叶者皆其本音其說最確他姑無論如龜兹國讀丘慈此直譯以同音並無意義是漢時讀龜為丘讀兹為慈之明証否則曷不直譯為丘慈字歟古字訛體字有訛體非但後世即古亦然馬伏波論成臯印文是矣官制尚爾俗用可知一筆一畫奉漢碑為典型此好古之過也且非但八分小篆亦然射字籀文象乎持弓形小篆轉弓形為身字轉乎形為寸字寸身為射果何意乎牡丹歐陽公謂古人不言牡丹王楙野客叢書引謝靈運集及尚書故實所載北齊楊子華畫駁之余謂古人但不言其花耳若其名則本草列為中品張仲景金匱要畧已用牡丹皮矣大毛公漢書不載大毛公之名陸璣毛詩草木蟲魚䟽始云毛亨亦不載伏生之名晉書伏滔傳始云逺祖勝金盌杜工部諸将詩第一首漢朝陵墓對南山二句言戰爭而陵寝震驚也昨日玉魚䝉塟地用劉明奴事言王公之墓不保也早時金盌出人間用盧充事言士庶之墓不保也連首二句讀之諸陵亦可危矣此所謂臣子之詞立言之體註者必附㑹茂陵玉盌殊失其㫖至戴叔倫詩有漢陵帝子黄金盌晉代仙人白玉棺句則似因杜詩而悞用叔倫徳宗時人在工部後也青史子賈誼新書引青史氏之記言太子生事其文與禮經相表裏漢志青史子五十七篇乃列小說家疑其他文駁襍也筆世稱蒙恬作筆或引禮史載筆駁之余謂不但此也虞書作㑹豈能以削竹調漆施五色哉怨於父母太平廣記載唐劉生夢見帝舜帝舜斥孟子稱號泣於旻天怨於父母二語為誣此小說妖妄之詞託帝舜以詆孟子不足深詰然足見唐時孟子本作怨於父母乃有是說蓋今本誤脱一字也六書所無之字五國故事書劉龑之名曰巖以龑字杜撰也設遇孫休之五子梁武帝之四公将闕其名乎張有書魏國夫人碑魏必作巍以魏字說文所無也設書諸葛亮碑當作諸葛諒書韓愈碑當作韓瘉乎王弼老子註老子第三十一章王弼無註今考其文蓋老子之言惟夫佳兵者不祥之器物或惡之故有道者不處君子居則貴左用兵則貴右二十九字以下皆弼之註兵者不祥之器至樂殺人者則不可以得志於天下矣此解前三句意也吉事尚左至以喪禮處之解後二句意也傳冩誤合為一耳曹大家讀曹大家之家作嘉音人必咥然以笑讀隂麗華之華作敷音人必色然以駭不知讀隂麗華入麻韻猶讀曹大家入麻韻也讀曹大家入虞韻猶讀隂麗華入虞韻也此之謂不充其類子羽子􅁝史記項羽本紀稱字羽而自序稱子羽漢書袁盎傳稱字絲而叙傳稱子􅁝案古人之字實皆一字但或糸以伯仲叔季或連子字為二字左傳所載可考論語顔淵曽晳顔路冉有皆稱一字言游過矣堂堂乎張也亦祇稱一字疑項籍袁盎亦偶稱一字遂相沿呼之爾九河碣石九河故道在滄景間古書鑿鑿碣石在永平古書亦鑿鑿惟由滄景而東注去海百餘里耳必使沿海行千餘里委曲以達碣石何也思其故迄不可解焚廪浚井戰國時襍說繁興一事而傳聞異詞名姓時代互異者諸子之書不知凡幾孟子當日亦諸子之流惟誦法孔子發明王道得聖學之正超出諸子之上耳故一切流俗附益之文有斥而闢之者亦有非大綱宏㫖所繫不及一一辨詰者焚廪浚井之說亦姑與就事論事不必果以為實跡也馬牛其風馬牛其風與臣妾逋逃相屬自以風逸為正義或曰牛走順風馬走逆風核諸物理無此事或曰牝牡相誘曰風馬牛豈竊妻以逃者耶核諸物理亦無此事𤓰州范宣子數駒支稱秦人迫逐其祖於𤓰州𤓰州在秦西境當迫逐而西不容聴其越秦而東也推求其理蓋竄入狄地從塞外抵太原而至晉荀吳敗無終及羣狄於太原無終在北不容越燕至晉蓋亦於塞外相從而至杜預已有是說祧諱魯武公諱敖廢敖山而魯乃有公孫敖宋翼祖諱敬而南宋張栻字敬夫又元趙緣督以宋宗室子而名友敬皆祧廟不諱也然臨文不諱可也以為名字則可用之字多矣何必是弦絃古字多通用故弦絃兩字經典互見廣韻據五經文字以弦為正體絃為俗書禮部韻畧舊本改弦為弓弦絃為八音之絲開禧元年進士費衮上劄子論之始改通用然制字各從其類琴瑟從弓究於義無取韻畧分註不為無義似不必以經典相難如謂說文有弦無絃則說文所無之字亦多矣切字等韻譯語之始左傳以鉦為丁寧以榖丘為句瀆之丘以寺人勃鞮為寺人披公榖以鄒為邾婁檀弓以木為彌牟此切字之始萌公羊以伐人伐於人異讀釋名以舌頭舌腹異音此等韻之始萌據隋書經籍志十四字母自漢明帝時與佛經俱入中國以字體不同世不行用說苑越人歌後漢書白狼王唐菆歌此譯語之始萌樵香小記卷上
