body:
  text: 樵香小記雜家類二雜考之屬提要臣等謹案樵香小記二卷國朝何琇撰琇字君琢號勵菴宛平人雍正癸丑進士官至宗人府主事是編皆考證之文凡一百二十條論經義者居其大半亦頗及字學韻學其論六書頗與舊説異同如謂禿字當從禾會意説文謂人伏禾下固屬􅍝妄即六書正訛改為從木諧聲亦非確論謂説文訓為字為母猴本末倒置當是先有為字乃借以名猴謂射字從身從寸為籕文象手持弓形之訛其説皆未免于獨創至其解春秋西狩獲麟解周禮奔者不禁解詩野有死麕亦時能發先儒所未發其學問大旨蓋出入於閻若璩顧炎武朱彝尊毛竒齡諸家故多演其緒論云乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f46d962b88fe860aea2bd2300c6df901cfb687da8c959a308c59ea7cffe65796
